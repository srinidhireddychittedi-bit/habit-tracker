name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci
      - run: npm run lint

  test-server:
    name: Server Tests
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: file:./test.db
      JWT_SECRET: test-secret-do-not-use-in-production
      JWT_REFRESH_SECRET: test-refresh-secret-do-not-use-in-production
      PORT: 3001
      CLIENT_URL: http://localhost:5173
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci
      - run: npx prisma generate --schema=server/prisma/schema.prisma
      - run: npx prisma db push --schema=server/prisma/schema.prisma --skip-generate
      - run: npm run test:coverage -w server
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: server-coverage
          path: server/coverage/

  test-client:
    name: Client Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci
      - run: npm run test:coverage -w client
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: client-coverage
          path: client/coverage/

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test-server, test-client]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci
      - run: npx prisma generate --schema=server/prisma/schema.prisma
      - run: npm run build -w client

