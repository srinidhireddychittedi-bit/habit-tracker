<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#059669" /> <!-- Rich Emerald -->
      <stop offset="100%" stop-color="#34D399" /> <!-- Soft Mint -->
    </linearGradient>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Rounded App Icon Base -->
  <rect width="512" height="512" rx="128" fill="url(#bgGrad)" />
  
  <!-- Concentric Zen Rings representing focus & aura -->
  <circle cx="256" cy="256" r="150" fill="none" stroke="white" stroke-width="4" opacity="0.15" />
  <circle cx="256" cy="256" r="120" fill="none" stroke="white" stroke-width="3" opacity="0.25" stroke-dasharray="6 6" />
  <circle cx="256" cy="256" r="90" fill="none" stroke="white" stroke-width="2" opacity="0.2" />

  <!-- Symmetrical Organic Leaf (Aesthetic Zen Symbol) -->
  <path d="M 256 166 C 316 206, 316 306, 256 346 C 196 306, 196 206, 256 166 Z" 
        fill="white" 
        filter="url(#softGlow)" />
        
  <!-- Organic curved stem cutout -->
  <path d="M 256 196 Q 246 256, 256 316" 
        fill="none" 
        stroke="#059669" 
        stroke-width="5" 
        stroke-linecap="round" 
        opacity="0.85" />
</svg>